<main>
    <section id="contacto" class="py-5" style="min-height: 80vh; display: flex; align-items: center;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card shadow border-0 p-4 rounded-4">
                        <h2 class="text-center mb-4 fw-bold text-success">Agenda una Cita Técnica</h2>
                        <form>
                            <div class="mb-3">
                                <label for="nombreBS" class="form-label fw-bold">Tu Nombre</label>
                                <input type="text" class="form-control" id="nombreBS" placeholder="Ej: Juan Pérez" required>
                            </div>
                            <div class="mb-3">
                                <label for="dispositivoBS" class="form-label fw-bold">Modelo del Dispositivo</label>
                                <input type="text" class="form-control" id="dispositivoBS" placeholder="Ej: iPhone 14, Samsung S23" required>
                            </div>
                            <div class="mb-3">
                                <label for="mensajeBS" class="form-label fw-bold">Falla o servicio requerido</label>
                                <textarea class="form-control" id="mensajeBS" rows="4" placeholder="Describe brevemente el problema de tu equipo" required></textarea>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-success btn-lg">Enviar Solicitud</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
